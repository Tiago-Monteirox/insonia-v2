<!doctype html><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .box { width: 72px; height: 56px; background: var(--ins-surface); border: 1px solid var(--ins-border-strong); }
  .lbl { font-family: var(--ins-font-mono); font-size: 10px; color: var(--ins-fg-muted); }
</style>
<div class="grid">
  <div class="cell"><div class="box" style="border-radius:4px"></div><div class="lbl">xs · 4</div></div>
  <div class="cell"><div class="box" style="border-radius:6px"></div><div class="lbl">sm · 6</div></div>
  <div class="cell"><div class="box" style="border-radius:8px"></div><div class="lbl">md · 8</div></div>
  <div class="cell"><div class="box" style="border-radius:12px"></div><div class="lbl">lg · 12</div></div>
  <div class="cell"><div class="box" style="border-radius:9999px"></div><div class="lbl">full</div></div>
</div>
