<!doctype html><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .row { display: grid; grid-template-columns: repeat(12, 1fr); gap: 6px; }
  .sw { aspect-ratio: 1; border-radius: var(--ins-radius-sm); border: 1px solid var(--ins-border); display: flex; flex-direction: column; justify-content: flex-end; padding: 6px; font-family: var(--ins-font-mono); font-size: 9px; color: #fff; }
  .sw.dark { color: var(--ins-neutral-900); }
  .sw .n { font-weight: 600; }
  .label { font-size: 11px; color: var(--ins-fg-muted); text-transform: uppercase; letter-spacing: .06em; font-weight: 600; margin-bottom: 10px; }
</style>
<div class="label">Neutrals — slate scale</div>
<div class="row">
  <div class="sw dark" style="background:var(--ins-neutral-0); border-color:var(--ins-neutral-200)"><span class="n">0</span></div>
  <div class="sw dark" style="background:var(--ins-neutral-50)"><span class="n">50</span></div>
  <div class="sw dark" style="background:var(--ins-neutral-100)"><span class="n">100</span></div>
  <div class="sw dark" style="background:var(--ins-neutral-200)"><span class="n">200</span></div>
  <div class="sw dark" style="background:var(--ins-neutral-300)"><span class="n">300</span></div>
  <div class="sw dark" style="background:var(--ins-neutral-400)"><span class="n">400</span></div>
  <div class="sw" style="background:var(--ins-neutral-500)"><span class="n">500</span></div>
  <div class="sw" style="background:var(--ins-neutral-600)"><span class="n">600</span></div>
  <div class="sw" style="background:var(--ins-neutral-700)"><span class="n">700</span></div>
  <div class="sw" style="background:var(--ins-neutral-800)"><span class="n">800</span></div>
  <div class="sw" style="background:var(--ins-neutral-900)"><span class="n">900</span></div>
  <div class="sw" style="background:var(--ins-neutral-950)"><span class="n">950</span></div>
</div>
