<!doctype html><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .row { display: grid; grid-template-columns: repeat(10, 1fr); gap: 8px; }
  .sw { aspect-ratio: 1; border-radius: var(--ins-radius-sm); border: 1px solid var(--ins-border); display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; font-family: var(--ins-font-mono); font-size: 10px; color: #fff; }
  .sw.dark { color: var(--ins-neutral-900); }
  .sw .n { font-weight: 600; }
  .label { font-size: 11px; color: var(--ins-fg-muted); text-transform: uppercase; letter-spacing: .06em; font-weight: 600; margin-bottom: 10px; }
</style>
<div class="label">Accent — teal</div>

  <div class="sw dark" style="background:var(--ins-accent-100)"><span class="n">100</span><span>#c7fbf5</span></div>
  <div class="sw dark" style="background:var(--ins-accent-200)"><span class="n">200</span><span>#90f5ec</span></div>
  <div class="sw dark" style="background:var(--ins-accent-300)"><span class="n">300</span><span>#52e7dd</span></div>
  <div class="sw" style="background:var(--ins-accent-400)"><span class="n">400</span><span>#22cec7</span></div>
  <div class="sw" style="background:var(--ins-accent-500)"><span class="n">500</span><span>#0ab3ae</span></div>
  <div class="sw" style="background:var(--ins-accent-600)"><span class="n">600</span><span>#068e8d</span></div>
  <div class="sw" style="background:var(--ins-accent-700)"><span class="n">700</span><span>#0a7172</span></div>
  <div class="sw" style="background:var(--ins-accent-800)"><span class="n">800</span><span>#0e595c</span></div>
  <div class="sw" style="background:var(--ins-accent-900)"><span class="n">900</span><span>#104a4c</span></div>
</div>
