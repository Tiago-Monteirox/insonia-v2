<!doctype html><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card-ex { background: #fff; border: 1px solid var(--ins-border); border-radius: var(--ins-radius-md); box-shadow: var(--ins-shadow-xs); padding: 16px; display: flex; gap: 14px; align-items: center; }
  .thumb { width: 72px; height: 72px; background: var(--ins-neutral-100); border-radius: var(--ins-radius-md); display: flex; align-items: center; justify-content: center; color: var(--ins-neutral-400); font-size: 28px; font-weight: 600; }
  .meta { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .cat { font-size: 11px; color: var(--ins-fg-muted); text-transform: uppercase; letter-spacing: .06em; font-weight: 600; }
  .name { font-size: 15px; font-weight: 600; color: var(--ins-fg); }
  .meta-row { font-size: 13px; color: var(--ins-fg-muted); display: flex; gap: 12px; }
  .price { font-family: var(--ins-font-mono); font-variant-numeric: tabular-nums; font-size: 18px; font-weight: 500; color: var(--ins-fg); }
</style>
<div class="card-ex">
  <div class="thumb">T</div>
  <div class="meta">
    <span class="cat">Calçados</span>
    <div class="name">Tênis Runner 3.0 — Preto</div>
    <div class="meta-row"><span>Nike</span><span>·</span><span>Estoque: 24</span><span>·</span><span>SKU-8421-BR</span></div>
  </div>
  <div class="price">R$ 449,90</div>
</div>
