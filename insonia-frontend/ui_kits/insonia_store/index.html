<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Insonia · Loja</title>
  <link rel="stylesheet" href="store.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="data.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="Chrome.jsx"></script>
  <script type="text/babel" src="ProductCard.jsx"></script>
  <script type="text/babel" src="Home.jsx"></script>
  <script type="text/babel" src="ProductDetail.jsx"></script>
  <script type="text/babel" src="Cart.jsx"></script>
  <script type="text/babel">
    function App() {
      const [page, setPage] = React.useState('home');
      const [product, setProduct] = React.useState(null);
      const [cartCount, setCartCount] = React.useState(loadCart().reduce((s,i)=>s+i.qty,0));
      const [theme, setTheme] = React.useState(() => {
        try { return localStorage.getItem('insonia_theme') || 'light'; } catch(e) { return 'light'; }
      });

      React.useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
        try { localStorage.setItem('insonia_theme', theme); } catch(e) {}
      }, [theme]);

      React.useEffect(() => {
        const h = () => setCartCount(loadCart().reduce((s,i)=>s+i.qty,0));
        window.addEventListener('cart-updated', h);
        return () => window.removeEventListener('cart-updated', h);
      }, []);

      const onNav = (p, prod) => {
        setPage(p);
        if (prod) setProduct(prod);
        window.scrollTo(0, 0);
      };
      const toggleTheme = () => setTheme(t => t === 'dark' ? 'light' : 'dark');

      return (
        <>
          <StoreHeader cartCount={cartCount} onNav={onNav} page={page} theme={theme} onToggleTheme={toggleTheme}/>
          {page === 'home' && <Home onOpen={(p)=>onNav('pdp', p)}/>}
          {page === 'pdp' && <ProductDetail product={product || storeProducts[0]} onNav={onNav}/>}
          {page === 'cart' && <Cart onNav={onNav}/>}
          <StoreFooter/>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
