<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Insonia · UI Kit</title>
  <link rel="stylesheet" href="app.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="api.js"></script>
  <script src="data.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="Sidebar.jsx"></script>
  <script type="text/babel" src="Dashboard.jsx"></script>
  <script type="text/babel" src="PDV.jsx"></script>
  <script type="text/babel" src="Produtos.jsx"></script>
  <script type="text/babel" src="Historico.jsx"></script>
  <script type="text/babel" src="Screens.jsx"></script>
  <script type="text/babel">
    const TITLES = {
      dashboard: 'Dashboard',
      pdv: 'Registrar venda',
      produtos: 'Produtos',
      categorias: 'Categorias',
      marcas: 'Marcas',
      variacoes: 'Variações',
      historico: 'Histórico',
      estatisticas: 'Estatísticas',
    };

    function App() {
      const saved = (() => { try { return localStorage.getItem('ins.nav'); } catch(e) { return null; } })();
      // Inicializa já logado se houver token válido no localStorage
      const [loggedIn, setLoggedIn] = React.useState(() => insApi.auth.isLoggedIn());
      const [page, setPage] = React.useState(saved || 'dashboard');
      React.useEffect(() => { try { localStorage.setItem('ins.nav', page); } catch(e) {} }, [page]);
      React.useEffect(() => { if (window.lucide) lucide.createIcons(); });

      // Registra o callback global para que gql() possa deslogar em caso de 401
      React.useEffect(() => {
        window.__insOnLogout = () => setLoggedIn(false);
        return () => { window.__insOnLogout = null; };
      }, []);

      function handleLogout() {
        insApi.logout();
        setLoggedIn(false);
      }

      if (!loggedIn) return <Login onLogin={() => setLoggedIn(true)} />;

      const Page = {
        dashboard: Dashboard, pdv: PDV, produtos: Produtos,
        categorias: Categorias, marcas: Marcas, variacoes: Variacoes,
        historico: Historico, estatisticas: Estatisticas,
      }[page] || Dashboard;

      return (
        <div className="app">
          <Sidebar current={page} onNavigate={setPage} />
          <div className="main">
            <Topbar title={TITLES[page]}>
              <button className="btn ghost icon-only"><i data-lucide="bell"></i></button>
              <button className="btn ghost sm" onClick={handleLogout}><i data-lucide="log-out"></i>Sair</button>
            </Topbar>
            <Page />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
